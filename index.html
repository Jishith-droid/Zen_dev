<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ZEN playground</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #1e1f29;
      --bg-panel:  #16171f;
      --bg-surface:#252636;
      --bg-line:   #2a2b3d;
      --border:    #383952;
      --border-soft:#2e2f42;

      --text:      #f8f8f2;
      --text-muted:#6272a4;
      --text-dim:  #44475a;

      /* Dracula palette */
      --kw:        #ff79c6;   /* keywords      – pink    */
      --fn:        #50fa7b;   /* function names – green   */
      --str:       #f1fa8c;   /* strings        – yellow  */
      --num:       #bd93f9;   /* numbers        – purple  */
      --comment:   #6272a4;   /* comments       – muted   */
      --op:        #ff79c6;   /* operators      – pink    */
      --type:      #8be9fd;   /* types/builtins – cyan    */
      --punct:     #ff5555;   /* punctuation    – red     */

      --accent:    #bd93f9;
      --accent2:   #ff79c6;
      --green:     #50fa7b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── TOP BAR ── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .traffic {
      display: flex;
      gap: 6px;
    }
    .traffic span {
      width: 12px; height: 12px;
      border-radius: 50%;
    }
    .traffic .r { background: #ff5555; }
    .traffic .y { background: #f1fa8c; }
    .traffic .g { background: #50fa7b; }

    .topbar-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      flex: 1;
      text-align: center;
    }

    .topbar-badge {
      font-size: 10px;
      font-weight: 700;
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 4px;
      padding: 2px 6px;
      letter-spacing: 0.05em;
    }

    /* ── LAYOUT ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      height: calc(100vh - 42px);
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 200px;
      background: var(--bg-panel);
      border-right: 1px solid var(--border);
      padding: 12px 0;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .sidebar-section {
      padding: 4px 14px;
      font-size: 9px;
      font-weight: 700;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 8px;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 0;
      transition: background 0.15s, color 0.15s;
      user-select: none;
    }
    .sidebar-item:hover { background: var(--bg-line); color: var(--text); }
    .sidebar-item.active { background: var(--bg-surface); color: var(--accent); }

    .sidebar-item .icon {
      font-size: 12px;
      width: 14px;
      text-align: center;
      opacity: 0.7;
    }

    /* ── MAIN ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── TABS ── */
    .tabs {
      display: flex;
      align-items: stretch;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto;
    }

    .tab {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      border-right: 1px solid var(--border-soft);
      white-space: nowrap;
      transition: background 0.15s;
      border-bottom: 2px solid transparent;
    }
    .tab.active {
      background: var(--bg);
      color: var(--text);
      border-bottom-color: var(--accent);
    }
    .tab:hover:not(.active) { background: var(--bg-line); }

    .tab-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    .tab-close {
      width: 14px; height: 14px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 3px;
      font-size: 10px;
      color: var(--text-dim);
      transition: background 0.1s, color 0.1s;
    }
    .tab-close:hover { background: var(--bg-line); color: var(--text); }

    /* ── EDITOR AREA ── */
    .editor-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 16px;
      gap: 12px;
    }

    /* ── CODE EDITOR ── */
    .editor-container {
      position: relative;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg-panel);
      overflow: hidden;
      flex-shrink: 0;
    }

    .editor-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 12px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border-soft);
      font-size: 11px;
      color: var(--text-muted);
    }

    .editor-header .lang-tag {
      display: flex; align-items: center; gap: 6px;
      font-weight: 600;
      color: var(--accent);
      font-size: 11px;
    }

    .editor-header .lang-tag::before {
      content: '';
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      display: block;
    }

    .editor-hint {
      font-size: 10px;
      color: var(--text-dim);
    }

    .editor-inner {
      display: flex;
      min-height: 160px;
    }

    .line-numbers {
      padding: 12px 0;
      background: var(--bg-panel);
      border-right: 1px solid var(--border-soft);
      user-select: none;
      flex-shrink: 0;
      min-width: 42px;
      text-align: right;
    }

    .line-numbers span {
      display: block;
      padding: 0 10px;
      font-size: 12px;
      line-height: 20px;
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
    }

    .code-area-wrap {
      position: relative;
      flex: 1;
      overflow: hidden;
    }

    /* The real textarea — invisible but functional */
    textarea.code {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      padding: 12px;
      font-size: 13.5px;
      line-height: 20px;
      font-family: 'JetBrains Mono', monospace;
      background: transparent;
      color: transparent;
      caret-color: var(--text);
      border: none;
      outline: none;
      resize: none;
      z-index: 2;
      white-space: pre;
      overflow: auto;
      tab-size: 2;
      -webkit-text-fill-color: transparent;
      spellcheck: false;
    }

    /* Highlighted mirror layer */
    .code-highlight {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      padding: 12px;
      font-size: 13.5px;
      line-height: 20px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text);
      pointer-events: none;
      z-index: 1;
      white-space: pre;
      overflow: hidden;
      word-break: break-all;
    }

    /* ── TOOLBAR ── */
    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: var(--bg-panel);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      letter-spacing: 0.02em;
    }
    .btn:hover {
      background: var(--bg-surface);
      border-color: var(--accent);
      transform: translateY(-1px);
    }
    .btn:active { transform: translateY(0); }

    .btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #16171f;
    }
    .btn.primary:hover {
      background: #c9a5ff;
      border-color: #c9a5ff;
    }

    .btn.danger {
      color: var(--punct);
      border-color: #3a2030;
    }
    .btn.danger:hover {
      background: #2a1520;
      border-color: var(--punct);
    }

    .btn .btn-icon { font-size: 13px; }

    /* ── OUTPUT PANELS ── */
    .panels {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }

    .panel {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg-panel);
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .panel[open] { border-color: var(--border); }
    .panel:hover { border-color: var(--border); }

    .panel > summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 14px;
      cursor: pointer;
      user-select: none;
      list-style: none;
      background: var(--bg-surface);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      gap: 10px;
      transition: background 0.15s;
    }
    .panel > summary::-webkit-details-marker { display: none; }
    .panel > summary:hover { background: var(--bg-line); }

    .panel-title-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-chevron {
      font-size: 9px;
      color: var(--text-dim);
      transition: transform 0.2s;
    }
    details[open] .panel-chevron { transform: rotate(90deg); }

    .panel-label {
      color: var(--text-muted);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .panel-tag {
      font-size: 9px;
      padding: 1px 6px;
      border-radius: 4px;
      font-weight: 700;
      letter-spacing: 0.06em;
    }
    .tag-tokens { background: #1a3a2a; color: var(--green); }
    .tag-ast    { background: #1a2a3a; color: var(--type);  }
    .tag-llvm   { background: #2a1a3a; color: var(--accent);}

    .panel-actions {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-shrink: 0;
    }

    .copy-btn {
      background: var(--bg-line);
      border: 1px solid var(--border-soft);
      color: var(--text-muted);
      padding: 3px 8px;
      font-size: 10px;
      border-radius: 5px;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      letter-spacing: 0.04em;
      transition: background 0.15s, color 0.15s;
    }
    .copy-btn:hover { background: var(--bg-surface); color: var(--text); }
    .copy-btn.copied { color: var(--green); border-color: var(--green); }

    .panel-body {
      padding: 12px 14px;
      font-size: 12.5px;
      line-height: 1.7;
      overflow-x: auto;
    }

    .tokens, .ast {
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
    }

    pre { margin: 0; }

    #llvm {
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--type);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
    }

    /* ── STATUS BAR ── */
    .statusbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 4px 16px;
      background: var(--bg-panel);
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    .statusbar .status-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .statusbar .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
    }

    .statusbar .ml-auto { margin-left: auto; }

    /* Download btn row */
    .download-row {
      display: flex;
      justify-content: flex-end;
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

    /* ── HIGHLIGHT CLASSES ── */
    .hl-kw      { color: #ff79c6; font-weight: 600; }
    .hl-str     { color: #f1fa8c; }
    .hl-num     { color: #bd93f9; }
    .hl-comment { color: #6272a4; font-style: italic; }
    .hl-fn      { color: #50fa7b; }
    .hl-type    { color: #8be9fd; }
    .hl-op      { color: #ff79c6; }
    .hl-punct   { color: #ff5555; }

    /* Mobile tweaks */
    @media (max-width: 640px) {
      .sidebar { display: none; }
      .editor-wrapper { padding: 10px; }
    }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="traffic">
      <span class="r"></span>
      <span class="y"></span>
      <span class="g"></span>
    </div>
    <div class="topbar-title">ZEN Playground</div>
    <div class="topbar-badge">v0.1</div>
  </div>

  <!-- LAYOUT -->
  <div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-section">Explorer</div>
      <div class="sidebar-item active">
        <span class="icon">◈</span> main.zen
      </div>
      <div class="sidebar-item">
        <span class="icon">◈</span> utils.zen
      </div>
      <div class="sidebar-item">
        <span class="icon">◈</span> types.zen
      </div>

      <div class="sidebar-section">Output</div>
      <div class="sidebar-item">
        <span class="icon">⊡</span> tokens
      </div>
      <div class="sidebar-item">
        <span class="icon">⊡</span> ast
      </div>
      <div class="sidebar-item">
        <span class="icon">⊡</span> llvm ir
      </div>
    </div>

    <!-- MAIN -->
    <div class="main">

      <!-- TABS -->
      <div class="tabs">
        <div class="tab active">
          <div class="tab-dot"></div>
          main.zen
          <div class="tab-close">✕</div>
        </div>
        <div class="tab">
          <div class="tab-dot" style="background:var(--text-dim)"></div>
          utils.zen
          <div class="tab-close">✕</div>
        </div>
      </div>

      <!-- EDITOR + PANELS -->
      <div class="editor-wrapper">

        <!-- CODE EDITOR -->
        <div class="editor-container">
          <div class="editor-header">
            <div class="lang-tag">ZEN</div>
            <div class="editor-hint">real-time highlight · tab = 2 spaces</div>
          </div>
          <div class="editor-inner">
            <div class="line-numbers" id="lineNumbers">
              <span>1</span>
            </div>
            <div class="code-area-wrap">
              <!-- highlight mirror -->
              <div class="code-highlight" id="codeHighlight" aria-hidden="true"></div>
              <!-- real textarea — DO NOT change class or id -->
              <textarea class="code" placeholder="// Write ZEN code here…" spellcheck="false"></textarea>
            </div>
          </div>
        </div>

        <!-- TOOLBAR -->
        <div class="toolbar">
          <button class="btn primary generate">
            <span class="btn-icon">⚡</span> Generate LLVM IR
          </button>
          <button class="btn danger clear">
            <span class="btn-icon">✕</span> Clear &amp; Copy
          </button>
          <button class="btn download-llvm" style="margin-left:auto">
            <span class="btn-icon">↓</span> Download .ll
          </button>
        </div>

        <!-- OUTPUT PANELS -->
        <div class="panels">

          <!-- TOKENS -->
          <details class="panel">
            <summary>
              <div class="panel-title-wrap">
                <span class="panel-chevron">▶</span>
                <span class="panel-label">Tokens</span>
                <span class="panel-tag tag-tokens">LEX</span>
              </div>
              <div class="panel-actions">
                <button class="copy-btn" data-copy="tokens">Copy</button>
              </div>
            </summary>
            <div class="panel-body">
              <div class="tokens"></div>
            </div>
          </details>

          <!-- AST -->
          <details class="panel">
            <summary>
              <div class="panel-title-wrap">
                <span class="panel-chevron">▶</span>
                <span class="panel-label">AST</span>
                <span class="panel-tag tag-ast">PARSE</span>
              </div>
              <div class="panel-actions">
                <button class="copy-btn" data-copy="ast">Copy</button>
              </div>
            </summary>
            <div class="panel-body">
              <div class="ast"></div>
            </div>
          </details>

          <!-- LLVM -->
          <details class="panel">
            <summary>
              <div class="panel-title-wrap">
                <span class="panel-chevron">▶</span>
                <span class="panel-label">LLVM IR</span>
                <span class="panel-tag tag-llvm">CODEGEN</span>
              </div>
              <div class="panel-actions">
                <button class="copy-btn" data-copy="llvm">Copy</button>
              </div>
            </summary>
            <div class="panel-body">
              <pre><code id="llvm"></code></pre>
            </div>
          </details>

        </div><!-- /panels -->
      </div><!-- /editor-wrapper -->

      <!-- STATUS BAR -->
      <div class="statusbar">
        <div class="status-item">
          <div class="status-dot"></div>
          Ready
        </div>
        <div class="status-item">ZEN</div>
        <div class="status-item" id="cursorPos">Ln 1, Col 1</div>
        <div class="status-item ml-auto">UTF-8</div>
        <div class="status-item">LF</div>
        <div class="status-item" id="lineCount">0 lines</div>
      </div>

    </div><!-- /main -->
  </div><!-- /layout -->

  <script>
    // ── Syntax Highlighter ──────────────────────────────────────────────────
    const KEYWORDS = [
      "if","else if","else","loop","break","continue","return","fn",
      "const","void","while","switch","case","default","import","export",
      "from","struct","auto","List","this","do","in","of","async","await","Map"
    ];

    // Escape HTML special chars
    function escapeHtml(s) {
      return s
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

// Tokenize + highlight
    function highlight(code) {
      // We walk char-by-char collecting "segments", then wrap each in a span.
      // Order matters: comments > strings > numbers > keywords > identifiers > operators

      const kwSet = new Set(KEYWORDS);

      // Sort keywords by length desc so "else if" matches before "else"
      const kwSorted = [...KEYWORDS].sort((a,b) => b.length - a.length);

      let result = '';
      let i = 0;
      const len = code.length;

      while (i < len) {
        const ch = code[i];

        // ── Single-line comment  //
        if (ch === '/' && code[i+1] === '/') {
          let j = i;
          while (j < len && code[j] !== '\n') j++;
          result += `<span class="hl-comment">${escapeHtml(code.slice(i,j))}</span>`;
          i = j;
          continue;
        }

        // ── Block comment  /* … */
        if (ch === '/' && code[i+1] === '*') {
          let j = i + 2;
          while (j < len && !(code[j-1] === '*' && code[j] === '/')) j++;
          j++; // include '/'
          result += `<span class="hl-comment">${escapeHtml(code.slice(i,j))}</span>`;
          i = j;
          continue;
        }

        // ── String  "…" or '…'
        if (ch === '"' || ch === "'") {
          const quote = ch;
          let j = i + 1;
          while (j < len && code[j] !== quote) {
            if (code[j] === '\\') j++; // skip escaped char
            j++;
          }
          j++; // closing quote
          result += `<span class="hl-str">${escapeHtml(code.slice(i,j))}</span>`;
          i = j;
          continue;
        }

        // ── Template literal  `…`
        if (ch === '`') {
          let j = i + 1;
          while (j < len && code[j] !== '`') {
            if (code[j] === '\\') j++;
            j++;
          }
          j++;
          result += `<span class="hl-str">${escapeHtml(code.slice(i,j))}</span>`;
          i = j;
          continue;
        }

        // ── Number  (integer or float)
        if ((ch >= '0' && ch <= '9') ||
            (ch === '.' && code[i+1] >= '0' && code[i+1] <= '9')) {
          let j = i;
          // hex
          if (ch === '0' && (code[j+1] === 'x' || code[j+1] === 'X')) {
            j += 2;
            while (j < len && /[0-9a-fA-F_]/.test(code[j])) j++;
          } else {
            while (j < len && /[0-9_]/.test(code[j])) j++;
            if (j < len && code[j] === '.') {
              j++;
              while (j < len && /[0-9_]/.test(code[j])) j++;
            }
            // exponent
            if (j < len && (code[j] === 'e' || code[j] === 'E')) {
              j++;
              if (j < len && (code[j] === '+' || code[j] === '-')) j++;
              while (j < len && /[0-9]/.test(code[j])) j++;
            }
          }
          result += `<span class="hl-num">${escapeHtml(code.slice(i,j))}</span>`;
          i = j;
          continue;
        }

        // ── Identifier or Keyword
        if (/[a-zA-Z_$]/.test(ch)) {
          // Try to match multi-word keyword first (e.g. "else if")
          let matched = false;
          for (const kw of kwSorted) {
            if (code.startsWith(kw, i)) {
              const after = code[i + kw.length];
              // keyword must be at word boundary
              if (after === undefined || /[\W]/.test(after)) {
                result += `<span class="hl-kw">${escapeHtml(kw)}</span>`;
                i += kw.length;
                matched = true;
                break;
              }
            }
          }
          if (matched) continue;

          // Otherwise: plain identifier
          let j = i;
          while (j < len && /[\w$]/.test(code[j])) j++;
          const word = code.slice(i, j);

          // Function call detection: ident followed by (
          if (code[j] === '(') {
            result += `<span class="hl-fn">${escapeHtml(word)}</span>`;
          } else {
            result += escapeHtml(word);
          }
          i = j;
          continue;
        }

        // ── Operators
        if (/[+\-*/%=<>!&|^~?:]/.test(ch)) {
          result += `<span class="hl-op">${escapeHtml(ch)}</span>`;
          i++;
          continue;
        }

        // ── Punctuation / braces
        if (/[{}()[\];,.]/.test(ch)) {
          result += `<span class="hl-punct">${escapeHtml(ch)}</span>`;
          i++;
          continue;
        }

        // ── Everything else (whitespace, newlines…)
        result += escapeHtml(ch);
        i++;
      }

      return result;
    }

    // ── Wire up the editor ──────────────────────────────────────────────────
    const textarea      = document.querySelector('textarea.code');
    const highlightDiv  = document.getElementById('codeHighlight');
    const lineNumbers   = document.getElementById('lineNumbers');
    const cursorPos     = document.getElementById('cursorPos');
    const lineCountEl   = document.getElementById('lineCount');

    function updateHighlight() {
      const code = textarea.value;
      highlightDiv.innerHTML = highlight(code) + '\n'; // trailing newline keeps height in sync
    }

    function updateLineNumbers() {
      const lines = textarea.value.split('\n');
      lineNumbers.innerHTML = lines.map((_,i) => `<span>${i+1}</span>`).join('');
      lineCountEl.textContent = `${lines.length} line${lines.length !== 1 ? 's' : ''}`;
    }

    function updateCursor() {
      const val = textarea.value;
      const sel = textarea.selectionStart;
      const lines = val.slice(0, sel).split('\n');
      const ln = lines.length;
      const col = lines[lines.length - 1].length + 1;
      cursorPos.textContent = `Ln ${ln}, Col ${col}`;
    }

    // Sync scroll
    textarea.addEventListener('scroll', () => {
      highlightDiv.scrollTop  = textarea.scrollTop;
      highlightDiv.scrollLeft = textarea.scrollLeft;
      lineNumbers.scrollTop   = textarea.scrollTop;
    });

    textarea.addEventListener('input', () => {
      updateHighlight();
      updateLineNumbers();
      updateCursor();
    });

    textarea.addEventListener('keydown', (e) => {
      // Tab → 2 spaces
      if (e.key === 'Tab') {
        e.preventDefault();
        const s = textarea.selectionStart;
        const end = textarea.selectionEnd;
        textarea.value = textarea.value.slice(0,s) + '  ' + textarea.value.slice(end);
        textarea.selectionStart = textarea.selectionEnd = s + 2;
        updateHighlight();
        updateLineNumbers();
      }
    });

    textarea.addEventListener('keyup', updateCursor);
    textarea.addEventListener('click', updateCursor);

    // init
    updateHighlight();
    updateLineNumbers();

    // ── Copy buttons ────────────────────────────────────────────────────────
    document.querySelectorAll('.copy-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const target = btn.dataset.copy;
        let text = '';
        if (target === 'tokens') text = document.querySelector('.tokens').textContent;
        else if (target === 'ast')  text = document.querySelector('.ast').textContent;
        else if (target === 'llvm') text = document.getElementById('llvm').textContent;
        navigator.clipboard.writeText(text).then(() => {
          btn.textContent = 'Copied!';
          btn.classList.add('copied');
          setTimeout(() => {
            btn.textContent = 'Copy';
            btn.classList.remove('copied');
          }, 1500);
        });
      });
    });

  </script>

  <script type="module" defer src="index.js"></script>
</body>
</html>
